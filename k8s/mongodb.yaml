apiVersion: v1
kind: Service
metadata:
  name: db  # IMPORTANTE: Este nombre debe ser "db" para que coincida con tu index.js
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        # Esto asegura que la DB tenga recursos suficientes en el cluster
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
